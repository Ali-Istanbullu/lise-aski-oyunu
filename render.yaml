services:
  - type: web
    name: lise-aski-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    # Kalıcı disk — SQLite verisi sunucu yeniden başlayınca kaybolmaz
    disk:
      name: lise-aski-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 7d
      - key: FRONTEND_URL
        value: https://YOUR-GITHUB-PAGES-URL.github.io
      # DB_PATH kalıcı diske yönlendirildi
      - key: DB_PATH
        value: /data/game.db
