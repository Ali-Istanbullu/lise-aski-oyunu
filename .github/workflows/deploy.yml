name: Deploy — Render (Backend)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  test:
    name: ✅ Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend
        env:
          NODE_ENV: test

  deploy-backend:
    name: 🚀 Render Deploy
    needs: test
    runs-on: ubuntu-latest
    # Sadece RENDER_API_KEY secret tanımlıysa çalış
    if: ${{ vars.RENDER_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: 🚀 Trigger Render Deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"

      - name: 🏥 Health Check
        run: |
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKEND_URL }}/health")
          [ "$STATUS" = "200" ] && echo "✅ OK" || (echo "❌ HTTP $STATUS" && exit 1)
